<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="pc.js"></script>

    <title>乗車/降車駅設定</title>

    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .section {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        select {
            width: 100%;
            padding: 0.5rem;
            font-size: 1rem;
        }

        button {
            padding: 0.6rem 1.2rem;
            font-size: 1rem;
            margin-right: 0.5rem;
        }

        .summary {
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 1rem;
            margin-top: 1rem;
        }

        #messageDiv {
            margin-top: 1rem;
            padding: 0.75rem;
            border: 1px solid #ddd;
            min-height: 2rem;
        }
    </style>
</head>

<body>
    <h1 id="pageTitle">乗車/降車駅設定</h1>

    <div class="section">
        <label for="lineSelect">
            線路
        </label>

        <select id="lineSelect">
        </select>
    </div>

    <div class="section">
        <label for="boardingSelect">
            乗車駅
        </label>

        <select id="boardingSelect">
        </select>
    </div>

    <div class="section">
        <label for="destinationSelect">
            降車駅
        </label>

        <select id="destinationSelect">
        </select>
    </div>

    <div class="section">
        <button id="applyButton">
            設定送信
        </button>

        <button id="resetButton">
            リセット
        </button>
    </div>

    <div class="summary">
        <h3>現在の設定</h3>

        <p>
            乗車駅：
            <span id="selectedBoarding">
                未選択
            </span>
        </p>

        <p>
            降車駅：
            <span id="selectedDestination">
                未選択
            </span>
        </p>
    </div>

    <div id="messageDiv">
        未接続
    </div>
</body>
</html>
